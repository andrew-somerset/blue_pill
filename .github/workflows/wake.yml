name: wake

on:
  workflow_dispatch:
  # Paused 2026-07-02 by operator: Stripe account under review, payments
  # blocked pending that (not a code/config issue — see TODO.md operator
  # note). Resuming from current state, no reset, once review clears.
  # Also disabled at the GitHub level (`gh workflow disable wake.yml`).
  # Re-enable both to resume:
  #   gh workflow enable wake.yml
  # schedule:
  #   - cron: "0 */4 * * *"

permissions:
  contents: write

concurrency:
  group: wake
  cancel-in-progress: false

jobs:
  wake:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run wake
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AGENTMAIL_API_KEY: ${{ secrets.AGENTMAIL_API_KEY }}
          AGENTMAIL_INBOX: ${{ secrets.AGENTMAIL_INBOX }}
          STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
          WALLET_PRIVATE_KEY: ${{ secrets.WALLET_PRIVATE_KEY }}
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
        run: python scripts/agent.py

      - name: Revert changes to protected paths
        run: git checkout -- .github scripts 2>/dev/null || true

      - name: Commit and push
        run: |
          git config user.name "blue_pill"
          git config user.email "blue-pill[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "wake $(date -u +'%Y-%m-%d %H:%M') UTC"
          git push
